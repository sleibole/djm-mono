<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Bad Request — DJMagic.io</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://kit.fontawesome.com/cade1152b0.js" crossorigin="anonymous" defer></script>
  <script>
    (function() {
      var t = localStorage.getItem("theme");
      if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      margin: 0;
    }
    .error-content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1rem;
    }
    .error-icon {
      font-size: 4rem;
      color: var(--pico-muted-color);
      margin-bottom: 1rem;
    }
    .error-code {
      font-size: 5rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 0.5rem;
      color: var(--pico-color);
    }
    .error-tagline {
      color: var(--pico-muted-color);
      margin-bottom: 1.5rem;
    }
    footer {
      text-align: center;
      padding: 1.5rem;
    }
    footer small {
      color: var(--pico-muted-color);
    }
  </style>
</head>
<body>
  <header class="container">
    <nav>
      <ul>
        <li><strong><a href="/">DJMagic.io</a></strong></li>
      </ul>
    </nav>
  </header>

  <div class="error-content">
    <div>
      <div class="error-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
      <div class="error-code">400</div>
      <h2>We couldn't read that request</h2>
      <p class="error-tagline">Something about the request didn't make sense. Please check the URL and try again.</p>
      <a href="/" role="button">Back to the main stage</a>
    </div>
  </div>

  <footer class="container">
    <small>DJMagic.io</small>
  </footer>
</body>
</html>
