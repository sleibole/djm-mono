fuse:
  dir: "/litefs"
  allow-other: true

data:
  dir: "/var/lib/litefs"

exit-on-error: false

proxy:
  addr: ":8080"
  target: "localhost:3000"
  db: "production.sqlite3"

exec:
  - cmd: "su rails -c 'cd /rails && bin/rails db:prepare'"
    if-candidate: true
  - cmd: "su rails -c '/rails/bin/fly-entrypoint'"

lease:
  type: "consul"
  advertise-url: "http://${FLY_ALLOC_ID}.vm.${FLY_APP_NAME}.internal:20202"
  candidate: ${FLY_REGION == PRIMARY_REGION}
  promote: true
  consul:
    url: "${FLY_CONSUL_URL}"
    key: "${FLY_APP_NAME}/primary"
